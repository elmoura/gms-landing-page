name: 🚀 Build and Deploy React + Vite to cPanel

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build-and-deploy:
    name: 📦 Build & Deploy
    runs-on: ubuntu-latest


    steps:
      # 1. Baixar o código do repositório
      - name: 📚 Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependências
      - name: 📦 Install dependencies
        run: npm ci
        # ou 'npm install' se não usar package-lock.json

      # 4. Build da aplicação
      - name: 🏗️ Build project
        run: npm run build
        env:
          # Injetar variáveis de ambiente do .env via Secrets
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Adicione outras variáveis VITE_* aqui

      # 5. Deploy via FTP para o cPanel
      - name: 📤 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          secure: true
          local-dir: ./dist/      # Pasta de build do Vite
          server-dir: ./public_html/          # Diretório raiz do FTP
          # Excluir arquivos desnecessários
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/.env*